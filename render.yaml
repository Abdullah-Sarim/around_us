services:
  - type: web
    name: backend
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  - type: web
    name: frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://around-us-backend.onrender.com/api
      - key: VITE_CLERK_PUBLISHABLE_KEY
